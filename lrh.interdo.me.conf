<VirtualHost *:80>
    ServerName lrh.interdo.me

    DocumentRoot /var/www/lrh
    DirectoryIndex index.html

    <Directory /var/www/lrh>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    # Custom error pages
    ErrorDocument 403 /403.html
    ErrorDocument 404 /404.html

    # Cache static assets aggressively; HTML/JSON get shorter TTL
    <FilesMatch "\.(css|js)$">
        Header set Cache-Control "max-age=3600, public"
    </FilesMatch>
    <FilesMatch "\.(html|json)$">
        Header set Cache-Control "max-age=300, public"
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/lrh-error.log
    CustomLog ${APACHE_LOG_DIR}/lrh-access.log combined
</VirtualHost>
