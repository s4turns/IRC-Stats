<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Forbidden</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 52px 44px;
      text-align: center;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    .icon { font-size: 36px; margin-bottom: 20px; line-height: 1; }
    .code {
      font-size: 80px;
      font-weight: 700;
      color: #f85149;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 12px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    p {
      color: #8b949e;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    a.btn-primary { background: #1f6feb; color: #fff; border: 1px solid #1f6feb; }
    a.btn-primary:hover { background: #388bfd; border-color: #388bfd; }
    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 28px 0 20px;
    }
    .footer-note { font-size: 12px; color: #484f58; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <div class="code">403</div>
    <h1>Forbidden</h1>
    <p>
      You don't have permission to access this page.
    </p>
    <div class="btn-row">
      <a class="btn btn-primary" href="/">← Back to Stats</a>
    </div>
    <hr class="divider">
    <p class="footer-note">IRC Stats by <a href="https://interdo.me" style="color:inherit">interdome</a> &mdash; lrh.interdo.me</p>
  </div>
</body>
</html>
